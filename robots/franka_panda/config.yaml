robot: "franka"
robot_scene: "scene.xml"

domain_id: 1  # Domain id, 0 for hardware, 1 for simulation
interface: "lo" # Interface, lo for localhost

use_joystick: 0
joystick_type: "xbox"
joystick_device: "/dev/input/js0"
joystick_bits: 16

print_scene_information: 1

enable_elastic_band: 0

camera_name: "wrist_camera"
camera_width: 640
camera_height: 480
camera_fps: 30
