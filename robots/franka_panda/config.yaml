robot: "franka_panda"
robot_scene: "scene.xml"


print_scene_information: 1
enable_elastic_band: 0

motor_commands_topic: "rt/lowcmd"
low_state_topic: "rt/lowstate"
bridge_rate: 1000

enable_cameras: 1
cameras:
  - name: "wrist_camera"
    topic: "rt/camera/image"
    width: 640
    height: 480
    fps: 30

enable_depth_cameras: 0
